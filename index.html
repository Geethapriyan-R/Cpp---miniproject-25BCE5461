<!DOCTYPE html>
<html>
<head>
    <title>Bus Reservation System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🚌 Bus Reservation System</h1>
</header>

<nav>
    <button onclick="showSection('routes')">Routes</button>
    <button onclick="showSection('book')">Book</button>
    <button onclick="showSection('search')">Search</button>
    <button onclick="showSection('report')">Report</button>
</nav>

<section id="routes"></section>

<section id="book" class="hidden">
    <h2>Book Ticket</h2>
    <input type="text" id="name" placeholder="Passenger Name">
    <select id="routeSelect"></select>
    <input type="number" id="seats" placeholder="No of seats (1-6)" min="1" max="6">
    <button onclick="bookTicket()">Book</button>
</section>

<section id="search" class="hidden">
    <h2>Search Ticket</h2>
    <input type="text" id="searchId" placeholder="Ticket ID">
    <button onclick="searchTicket()">Search</button>
    <div id="searchResult"></div>
</section>

<section id="report" class="hidden">
    <h2>Revenue Report</h2>
    <div id="reportData"></div>
</section>

<script src="script.js"></script>
</body>
</html>
